name: Actualizar datos SFC Datos

on:
  schedule:
    - cron: "0 21 * * 6,0"
    - cron: "0 22 * * 6,0"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check_time.outputs.should_run }}
    steps:
      - name: Comprobar que son las 23:00 en Madrid
        id: check_time
        run: |
          HOUR=$(TZ="Europe/Madrid" date +%H)
          if [ "$HOUR" = "23" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "No son las 23:00 en Madrid (son las $HOUR:xx), esta ejecución se salta."
          fi

      - uses: actions/checkout@v4
        if: steps.check_time.outputs.should_run == 'true'

      - uses: actions/setup-python@v5
        if: steps.check_time.outputs.should_run == 'true'
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        if: steps.check_time.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Descargar y parsear actas nuevas
        if: steps.check_time.outputs.should_run == 'true'
        run: python scraper.py

      - name: Recalcular estadísticas agregadas
        if: steps.check_time.outputs.should_run == 'true'
        run: python build_stats.py

      - name: Commitear datos actualizados
        if: steps.check_time.outputs.should_run == 'true'
        run: |
          git config user.name "sfcdatos-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --quiet --cached || git commit -m "Actualización de datos automática $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

  deploy-pages:
    needs: update-data
    if: needs.update-data.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "site"
      - id: deployment
        uses: actions/deploy-pages@v4
