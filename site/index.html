<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFC Datos — Lliga Elit Grup 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --pitch-dark:#0c2118;
    --pitch-mid:#123324;
    --panel:#173d2c;
    --panel-line:#2a5540;
    --chalk:#f2efe3;
    --chalk-dim:#b9c9bd;
    --amber:#e8b33d;
    --amber-dim:#7a6023;
    --clay:#c1443b;
    --clay-dim:#5c2620;
    --font-display:'Oswald',sans-serif;
    --font-mono:'Space Mono',monospace;
    --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--pitch-dark);
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 90px);
    color:var(--chalk);
    font-family:var(--font-body);
    min-height:100vh;
  }
  ::selection{background:var(--amber);color:var(--pitch-dark);}

  /* ---------- layout ---------- */
  .app{display:flex;min-height:100vh;}

  /* ---------- sidebar ---------- */
  .sidebar{
    width:300px;
    min-width:300px;
    background:var(--pitch-mid);
    border-right:1px solid var(--panel-line);
    display:flex;
    flex-direction:column;
    height:100vh;
    position:sticky;
    top:0;
  }
  .brand{
    padding:22px 20px 16px;
    border-bottom:1px solid var(--panel-line);
  }
  .brand-mark{
    font-family:var(--font-display);
    font-weight:700;
    font-size:22px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    display:flex;
    align-items:baseline;
    gap:6px;
  }
  .brand-mark span{color:var(--amber);}
  .brand-sub{
    font-family:var(--font-mono);
    font-size:11px;
    color:var(--chalk-dim);
    margin-top:4px;
    letter-spacing:0.5px;
  }
  .mode-toggle{
    margin:14px 20px 4px;
    display:flex;
    background:var(--pitch-dark);
    border:1px solid var(--panel-line);
    border-radius:6px;
    padding:3px;
    gap:3px;
  }
  .mode-toggle button{
    flex:1;
    background:transparent;
    border:none;
    color:var(--chalk-dim);
    font-family:var(--font-body);
    font-size:12px;
    font-weight:600;
    padding:8px 6px;
    border-radius:4px;
    cursor:pointer;
    letter-spacing:0.3px;
  }
  .mode-toggle button.active{
    background:var(--amber);
    color:var(--pitch-dark);
  }
  .search-box{margin:14px 20px;}
  .search-box input{
    width:100%;
    background:var(--pitch-dark);
    border:1px solid var(--panel-line);
    color:var(--chalk);
    padding:9px 12px;
    border-radius:6px;
    font-family:var(--font-body);
    font-size:13px;
  }
  .search-box input::placeholder{color:var(--chalk-dim);}
  .compare-hint{
    margin:0 20px 10px;
    font-size:11px;
    color:var(--chalk-dim);
    line-height:1.5;
    font-family:var(--font-body);
  }
  .compare-hint b{color:var(--amber);}

  .team-list{
    flex:1;
    overflow-y:auto;
    padding:6px 12px 20px;
  }
  .team-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 10px;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:2px;
    border:1px solid transparent;
    position:relative;
  }
  .team-row:hover{background:rgba(255,255,255,0.04);}
  .team-row.selected{
    background:var(--panel);
    border-color:var(--panel-line);
  }
  .team-row.selected-a{border-color:var(--amber);background:rgba(232,179,61,0.08);}
  .team-row.selected-b{border-color:var(--clay);background:rgba(193,68,59,0.08);}
  .crest{
    width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:10px;font-weight:700;
    background:var(--panel-line);color:var(--chalk);
    flex-shrink:0;object-fit:contain;
    overflow:hidden;
  }
  .crest img{width:100%;height:100%;object-fit:contain;}
  .team-name{font-size:13px;font-weight:500;line-height:1.25;}
  .team-tag{
    margin-left:auto;
    font-family:var(--font-mono);
    font-size:10px;
    padding:2px 6px;
    border-radius:3px;
    background:var(--amber);
    color:var(--pitch-dark);
    font-weight:700;
  }
  .team-tag.b{background:var(--clay);color:var(--chalk);}

  .sidebar-foot{
    padding:14px 20px;
    border-top:1px solid var(--panel-line);
    font-size:11px;
    color:var(--chalk-dim);
    font-family:var(--font-mono);
  }

  /* ---------- main ---------- */
  .main{flex:1;padding:32px 40px;max-width:1100px;}
  .empty-state{
    display:flex;flex-direction:column;align-items:flex-start;
    gap:10px;margin-top:80px;max-width:480px;
  }
  .empty-state h2{font-family:var(--font-display);font-size:28px;margin:0;text-transform:uppercase;}
  .empty-state p{color:var(--chalk-dim);line-height:1.6;font-size:14px;}

  .team-header{display:flex;align-items:center;gap:18px;margin-bottom:6px;}
  .team-header .crest{width:56px;height:56px;font-size:16px;}
  .team-header h1{
    font-family:var(--font-display);
    font-size:32px;
    text-transform:uppercase;
    margin:0;
    letter-spacing:0.3px;
  }
  .team-meta{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--chalk-dim);
    margin-top:2px;
  }

  .tabs{display:flex;gap:4px;margin:26px 0 20px;border-bottom:1px solid var(--panel-line);}
  .tab-btn{
    background:transparent;border:none;color:var(--chalk-dim);
    font-family:var(--font-display);font-size:15px;letter-spacing:0.4px;
    text-transform:uppercase;padding:10px 4px;margin-right:22px;
    cursor:pointer;border-bottom:2px solid transparent;
  }
  .tab-btn.active{color:var(--amber);border-bottom-color:var(--amber);}

  /* stat cards */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:28px;}
  .stat-card{
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:8px;
    padding:16px 18px;
  }
  .stat-card .label{font-size:11px;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:0.5px;font-family:var(--font-body);font-weight:600;}
  .stat-card .value{font-family:var(--font-mono);font-size:26px;color:var(--chalk);margin-top:6px;}
  .stat-card .value small{font-size:13px;color:var(--chalk-dim);}

  /* minute timeline (signature element) */
  .timeline{display:flex;height:210px;border-radius:5px;overflow:visible;border:1px solid var(--panel-line);border-bottom-width:2px;}
  .timeline .seg{flex:1;position:relative;background:var(--pitch-dark);border-right:1px solid var(--panel-line);}
  .timeline .seg:last-child{border-right:none;}
  .timeline .seg .fill{position:absolute;bottom:0;left:0;right:0;background:var(--amber);min-height:2px;transition:height 0.2s ease;}
  .timeline .seg .fill.clay{background:var(--clay);}
  .timeline .seg-value{
    position:absolute;left:0;right:0;text-align:center;transform:translateY(-100%);
    padding-bottom:6px;font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--chalk);
  }
  .timeline-labels{display:flex;font-family:var(--font-mono);font-size:9px;color:var(--chalk-dim);margin-top:5px;}
  .timeline-labels span{flex:1;text-align:center;}
  .timeline-block-title{font-size:12px;color:var(--chalk-dim);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.4px;}

  .section-block{margin-bottom:30px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;}

  /* players table */
  table.players{width:100%;border-collapse:collapse;font-size:13px;}
  table.players th{
    text-align:left;font-family:var(--font-body);font-weight:600;font-size:11px;
    color:var(--chalk-dim);text-transform:uppercase;letter-spacing:0.4px;
    padding:8px 10px;border-bottom:1px solid var(--panel-line);
    user-select:none;
  }
  table.players th.sortable{cursor:pointer;white-space:nowrap;}
  table.players th.sortable:hover{color:var(--chalk);}
  table.players th.sortable.active{color:var(--amber);}
  table.players td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.05);vertical-align:middle;}
  table.players tr:hover td{background:rgba(255,255,255,0.03);}
  .pos-badge{
    font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:3px;
    background:var(--panel-line);color:var(--chalk);white-space:nowrap;
  }
  .pos-badge.gk{background:var(--amber);color:var(--pitch-dark);}
  .mini-range{width:120px;}
  .mini-range .bar{height:6px;background:var(--pitch-dark);border-radius:3px;position:relative;overflow:hidden;border:1px solid var(--panel-line);}
  .mini-range .bar .fill{position:absolute;top:0;bottom:0;background:var(--amber);}
  .mini-range .txt{font-family:var(--font-mono);font-size:10px;color:var(--chalk-dim);margin-top:3px;}
  .num{font-family:var(--font-mono);}
  .name-cell{font-weight:500;}
  .name-cell .dorsal{color:var(--chalk-dim);font-family:var(--font-mono);font-size:11px;margin-right:6px;}

  /* compare mode */
  .compare-wrap h1{font-family:var(--font-display);text-transform:uppercase;font-size:26px;margin-bottom:4px;}
  .compare-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
  .compare-team-title{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:19px;text-transform:uppercase;margin-bottom:12px;}
  .compare-team-title .crest{width:34px;height:34px;}
  .compare-stat-row{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--panel-line);}
  .compare-stat-row .a, .compare-stat-row .c{font-family:var(--font-mono);font-size:16px;}
  .compare-stat-row .a{text-align:right;color:var(--amber);}
  .compare-stat-row .c{text-align:left;color:var(--clay);}
  .compare-stat-row .label{font-size:11px;color:var(--chalk-dim);text-align:center;text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap;}

  .footnote{font-size:11px;color:var(--chalk-dim);margin-top:36px;padding-top:16px;border-top:1px solid var(--panel-line);line-height:1.6;font-family:var(--font-mono);}
  .footnote b{color:var(--amber);}

  @media (max-width:900px){
    .app{flex-direction:column;}
    .sidebar{width:100%;min-width:0;height:auto;position:relative;}
    .main{padding:20px;}
    .two-col, .compare-cols{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">SFC<span>DATOS</span></div>
      <div class="brand-sub">LLIGA ELIT · GRUP 1 · 25/26</div>
    </div>

    <div class="mode-toggle">
      <button id="btnModeTeam" class="active">Equipo</button>
      <button id="btnModeCompare">Comparar</button>
    </div>

    <div class="search-box"><input id="searchInput" placeholder="Buscar equipo…"></div>
    <div class="compare-hint" id="compareHint" style="display:none;">Selecciona dos equipos: primero <b>Equipo A</b>, luego <b>Equipo B</b>.</div>

    <div class="team-list" id="teamList"></div>

    <div class="sidebar-foot" id="sidebarNote">Cargando datos…</div>
  </aside>

  <main class="main" id="main"></main>
</div>

<script>
/* =========================================================================
   MODELO DE DATOS (de ejemplo)
   Esta es la misma forma en la que el scraper real generará teams.json.
   Los tramos de minutos siempre son 6 bloques de 15': [0-15,15-30,30-45,45-60,60-75,75-90]
   ========================================================================= */
const BUCKET_LABELS = ["0-15","15-30","30-45","45-60","60-75","75-90"];

function mkPlayer(dorsal,name,position,minTotal,partidos,goles,rangoIni,rangoFin,golesEncajados=null){
  return {
    dorsal,name,position,
    callUpsTotal:partidos,
    titularTotal:partidos,
    suplenteTotal:0,
    minutesTotal:minTotal,
    matches:partidos,
    minutesAvg:+(minTotal/partidos).toFixed(1),
    goalsTotal:goles,
    goalsAvg:+(goles/partidos).toFixed(2),
    rangeStart:rangoIni,
    rangeEnd:rangoFin,
    goalsConcededTotal:golesEncajados,
    goalsConcededAvg:golesEncajados!==null?+(golesEncajados/partidos).toFixed(2):null,
    yellowCardsCycles:0,
    yellowCardsTally:Math.min(partidos%5,4),
    yellowCardsScore:Math.min(partidos%5,4)
  };
}

function mkTeam(id,name,crestUrl,initials,played,gaTotal,gfBuckets,gaBuckets,players){
  const gfTotal = gfBuckets.reduce((a,b)=>a+b,0);
  return {
    id,name,crestUrl,initials,played,
    goalsForTotal:gfTotal,
    goalsForAvg:+(gfTotal/played).toFixed(2),
    goalsAgainstTotal:gaTotal,
    goalsAgainstAvg:+(gaTotal/played).toFixed(2),
    gfBucketsTotal:gfBuckets,
    gfBucketsAvg:gfBuckets.map(v=>+(v/played).toFixed(2)),
    gaBucketsTotal:gaBuckets,
    gaBucketsAvg:gaBuckets.map(v=>+(v/played).toFixed(2)),
    players
  };
}

const MOCK_TEAMS = [
  mkTeam("santfeliuenc-fc-a","Santfeliuenc, F.C. A",
    "https://files.fcf.cat/escudos/clubes/escudos/00100_0000574621_stfeliuenc_200x200.png","SF",
    30, 28, [4,7,6,5,9,8], [3,6,8,4,5,2],
    [
      mkPlayer(1,"Vázquez Alonso, Marc","Portero",2610,29,0,0,90,28),
      mkPlayer(3,"Villegas Santos, Albert","Defensa",2210,28,1,0,90),
      mkPlayer(6,"Varese Nafa, Andrés","Defensa",1890,25,0,0,80),
      mkPlayer(7,"Méndez Giraldez, Iván","Centrocampista",1640,24,2,15,75),
      mkPlayer(8,"Carbonell Gil, Marc","Centrocampista",1420,22,3,20,70),
      mkPlayer(19,"Honorato Torrejón, Kilian","Delantero",1980,27,11,10,85),
      mkPlayer(21,"Guillem Armada, Saúl","Delantero",1120,20,6,45,90),
      mkPlayer(28,"Durán Manzanilla, Hugo","Delantero",640,18,3,60,90),
    ]),
  mkTeam("san-mauro-ud-a","San Mauro, U.D. A",
    "https://files.fcf.cat/escudos/clubes/escudos/00100_0001021772_ESCUDO_NUEVO_UD_SAN_MAURO_BUENO_camiseta_juego.png","SM",
    30, 33, [5,6,7,6,4,9], [4,5,7,6,6,5],
    [
      mkPlayer(25,"Martínez Benítez, Caleb","Portero",2700,30,0,0,90,33),
      mkPlayer(4,"Masegosa Solís, Albert","Defensa",2450,29,0,0,90),
      mkPlayer(5,"García García, Javier","Defensa",2100,27,1,0,85),
      mkPlayer(10,"Aribau Casals, Jordi","Centrocampista",2350,28,4,5,80),
      mkPlayer(19,"Cañero Carmona, Alex","Delantero",1560,24,9,30,90),
      mkPlayer(11,"Yáñez Borràs, Pau","Delantero",1340,21,5,35,85),
      mkPlayer(21,"Marquillas Bonavila, Gerard","Defensa",1980,26,2,0,90),
    ]),
  mkTeam("atletic-sant-just-f-c-a","Atlètic Sant Just, F.C. A",
    null,"AJ",
    30, 24, [3,5,7,4,3,5], [2,4,5,3,4,3],
    [
      mkPlayer(13,"Roca Fontanet, Pol","Portero",2580,29,0,0,90,24),
      mkPlayer(4,"Puig Serrat, Bernat","Defensa",2340,28,1,0,90),
      mkPlayer(9,"Alsina Roig, Marc","Delantero",1720,23,10,25,90),
      mkPlayer(8,"Ferrer Camps, David","Centrocampista",1980,26,4,10,80),
    ]),
  mkTeam("martinenc-fc-a","Martinenc, F.C. A",
    null,"MA",
    30, 30, [6,5,6,7,3,6], [5,5,6,5,4,5],
    [
      mkPlayer(1,"Soler Batlle, Jan","Portero",2650,29,0,0,90,30),
      mkPlayer(6,"Navarro Puig, Aleix","Defensa",2200,27,0,0,90),
      mkPlayer(11,"Rovira Duran, Nil","Delantero",1600,22,8,20,88),
    ]),
  mkTeam("rubi-ue-a","Rubí, U.E. A",
    null,"RU",
    30, 21, [2,4,5,6,2,4], [3,3,4,4,3,4],
    [
      mkPlayer(1,"Blanco Iglesias, Rubén","Portero",2700,30,0,0,90,21),
      mkPlayer(9,"Torres Camacho, Iker","Delantero",1850,25,12,15,90),
    ]),
  mkTeam("horta-uat-a","Horta, U.AT. A",
    null,"HO",
    30, 27, [4,6,5,5,4,7], [4,4,5,5,4,4],
    [
      mkPlayer(1,"Padrós Vila, Enric","Portero",2600,29,0,0,90,27),
      mkPlayer(17,"Company Ribas, Oriol","Delantero",1400,20,7,40,85),
    ]),
];

/* ========================================================================= */

let mode = "team";          // "team" | "compare"
let TEAMS = [];
let selectedTeamId = null;
let compareA = null, compareB = null;
let activeTab = "plantilla"; // "plantilla" | "equipo"

function slugify(str) {
  return str.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z0-9]+/g, "-")
    .replace(/^-+|-+$/g, "");
}

function initialsOf(name) {
  return name.split(/[\s,]+/).filter(Boolean).slice(0, 2).map(w => w[0]).join("").toUpperCase();
}

async function loadRealData() {
  const noteEl = document.getElementById("sidebarNote");
  try {
    const [teamsRes, playersRes] = await Promise.all([
      fetch("data/teams.json"),
      fetch("data/players.json"),
    ]);
    if (!teamsRes.ok || !playersRes.ok) throw new Error("HTTP no-ok al pedir los JSON");
    const teamsObj = await teamsRes.json();
    const playersObj = await playersRes.json();

    const playersByTeam = {};
    Object.values(playersObj).forEach(p => {
      p.yellowCardsScore = (p.yellowCardsCycles ?? 0) * 5 + (p.yellowCardsTally ?? 0);
      (playersByTeam[p.team] ||= []).push(p);
    });

    TEAMS = Object.values(teamsObj)
      .map(t => ({
        id: slugify(t.name),
        name: t.name,
        crestUrl: null,
        initials: initialsOf(t.name),
        played: t.matchesPlayed,
        goalsForTotal: t.goalsForTotal,
        goalsForAvg: t.goalsForAvg,
        goalsAgainstTotal: t.goalsAgainstTotal,
        goalsAgainstAvg: t.goalsAgainstAvg,
        gfBucketsTotal: t.gfBucketsTotal,
        gfBucketsAvg: t.gfBucketsAvg,
        gaBucketsTotal: t.gaBucketsTotal,
        gaBucketsAvg: t.gaBucketsAvg,
        keyMoments: t.keyMoments,
        players: (playersByTeam[t.name] || []).sort((a, b) => b.minutesTotal - a.minutesTotal),
      }))
      .sort((a, b) => a.name.localeCompare(b.name));

    if (noteEl) noteEl.textContent = `Datos reales · ${TEAMS.length} equipos · temporada 25/26`;
  } catch (err) {
    console.warn("No se pudieron cargar data/teams.json y data/players.json, muestro datos de ejemplo.", err);
    TEAMS = MOCK_TEAMS;
    if (noteEl) noteEl.textContent = "⚠ No se pudo cargar data/teams.json — mostrando datos de ejemplo";
  }
  selectedTeamId = TEAMS[0]?.id ?? null;
  renderAll();
}

const teamListEl = document.getElementById("teamList");
const mainEl = document.getElementById("main");
const searchInput = document.getElementById("searchInput");
const compareHint = document.getElementById("compareHint");

document.getElementById("btnModeTeam").onclick = () => { mode="team"; syncModeButtons(); renderAll(); };
document.getElementById("btnModeCompare").onclick = () => { mode="compare"; syncModeButtons(); renderAll(); };
searchInput.addEventListener("input", renderSidebar);

function syncModeButtons(){
  document.getElementById("btnModeTeam").classList.toggle("active", mode==="team");
  document.getElementById("btnModeCompare").classList.toggle("active", mode==="compare");
  compareHint.style.display = mode==="compare" ? "block" : "none";
}

function crestHtml(team, size){
  if(team.crestUrl){
    return `<div class="crest" style="width:${size}px;height:${size}px"><img src="${team.crestUrl}" alt=""></div>`;
  }
  return `<div class="crest" style="width:${size}px;height:${size}px">${team.initials}</div>`;
}

function renderSidebar(){
  const q = searchInput.value.trim().toLowerCase();
  teamListEl.innerHTML = "";
  TEAMS.filter(t=>t.name.toLowerCase().includes(q)).forEach(team=>{
    const row = document.createElement("div");
    row.className = "team-row";
    if(mode==="team" && team.id===selectedTeamId) row.classList.add("selected");
    if(mode==="compare" && team.id===compareA) row.classList.add("selected-a");
    if(mode==="compare" && team.id===compareB) row.classList.add("selected-b");

    let tag = "";
    if(mode==="compare" && team.id===compareA) tag = `<span class="team-tag">A</span>`;
    if(mode==="compare" && team.id===compareB) tag = `<span class="team-tag b">B</span>`;

    row.innerHTML = `${crestHtml(team,26)}<span class="team-name">${team.name}</span>${tag}`;
    row.onclick = () => {
      if(mode==="team"){
        selectedTeamId = team.id;
      } else {
        if(compareA===team.id){ compareA=null; }
        else if(compareB===team.id){ compareB=null; }
        else if(!compareA){ compareA=team.id; }
        else if(!compareB){ compareB=team.id; }
        else { compareA=team.id; compareB=null; }
      }
      renderAll();
    };
    teamListEl.appendChild(row);
  });
}

function timelineHtml(totals, avgs, colorClass){
  const max = Math.max(...totals, 1);
  const segs = totals.map((v,i)=>{
    const h = Math.round((v/max)*100);
    return `<div class="seg" title="${BUCKET_LABELS[i]}': ${v} total / ${avgs[i]} media por partido">
              <div class="seg-value" style="bottom:${h}%">${v}</div>
              <div class="fill ${colorClass||''}" style="height:${h}%"></div>
            </div>`;
  }).join("");
  const labels = BUCKET_LABELS.map(l=>`<span>${l}</span>`).join("");
  return `<div class="timeline">${segs}</div><div class="timeline-labels">${labels}</div>`;
}

const KEY_MOMENT_ROWS = [
  { forKey: "early1_10For",     againstKey: "early1_10Against",     label: "Inicio de partido (1'-10')" },
  { forKey: "halfEnd40_45For",  againstKey: "halfEnd40_45Against",  label: "Final 1ª parte (40'-45')" },
  { forKey: "halfStart45_50For",againstKey: "halfStart45_50Against",label: "Inicio 2ª parte (45'-50')" },
  { forKey: "lateDecisiveFor",  againstKey: "lateDecisiveAgainst",  label: "Gol decisivo tardío (80'+)" },
  { forKey: "quickResponseFor", againstKey: "quickResponseAgainst", label: "Respuesta rápida (≤5' de otro gol)" },
];

function keyMomentsTable(km){
  km = km || {};
  const rows = KEY_MOMENT_ROWS.map(r => `
    <tr>
      <td>${r.label}</td>
      <td class="num" style="color:var(--amber)">${km[r.forKey] ?? 0}</td>
      <td class="num" style="color:var(--clay)">${km[r.againstKey] ?? 0}</td>
    </tr>
  `).join("");
  return `<table class="players">
    <thead><tr><th>Momento</th><th>A favor</th><th>En contra</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function playerRangeBar(p){
  const pct1 = (p.rangeStart/90)*100;
  const pct2 = (p.rangeEnd/90)*100;
  return `<div class="mini-range">
    <div class="bar"><div class="fill" style="left:${pct1}%;width:${pct2-pct1}%"></div></div>
    <div class="txt">${p.rangeStart}'–${p.rangeEnd}'</div>
  </div>`;
}

function posBadge(pos){
  const cls = pos==="Portero" ? "pos-badge gk" : "pos-badge";
  return `<span class="${cls}">${pos}</span>`;
}

const SORT_COLUMNS = [
  { key: "name", label: "Jugador", type: "string" },
  { key: "position", label: "Pos.", type: "string" },
  { key: "callUpsTotal", label: "Convocatorias", type: "number" },
  { key: "matches", label: "Participaciones", type: "number" },
  { key: "titularTotal", label: "Titular", type: "number" },
  { key: "suplenteTotal", label: "Suplente", type: "number" },
  { key: "minutesTotal", label: "Minutos", type: "number" },
  { key: "minutesAvg", label: "Min./partido", type: "number" },
  { key: "goalsTotal", label: "Goles", type: "number" },
  { key: "goalsAvg", label: "Goles/partido", type: "number" },
  { key: "goalsConcededTotal", label: "Encajados (total / media)", type: "number" },
  { key: "yellowCardsScore", label: "Amarillas", type: "number" },
];

let sortState = { key: "minutesTotal", dir: "desc" };

function setSort(key){
  if(sortState.key === key){
    sortState.dir = sortState.dir === "asc" ? "desc" : "asc";
  } else {
    sortState.key = key;
    sortState.dir = "desc";
  }
  renderAll();
}

function sortPlayers(players){
  const { key, dir } = sortState;
  const mul = dir === "asc" ? 1 : -1;
  return [...players].sort((a,b)=>{
    let va = a[key], vb = b[key];
    const vaNull = va===null || va===undefined;
    const vbNull = vb===null || vb===undefined;
    if(vaNull && vbNull) return 0;
    if(vaNull) return 1;   // los "sin dato" (p.ej. encajados de no-porteros) siempre al final
    if(vbNull) return -1;
    if(typeof va === "string") return mul * va.localeCompare(vb, "es");
    return mul * (va - vb);
  });
}

function yellowCardsDisplay(p){
  const cycles = p.yellowCardsCycles ?? 0;
  const tally = p.yellowCardsTally ?? 0;
  let squares = "";
  for(let i=1; i<=tally; i++){
    squares += (i % 5 === 0) ? "🟧" : "🟨";
  }
  return `<span style="color:var(--chalk-dim)">(${cycles})</span> ${squares}`;
}

function playersTable(players){
  const sorted = sortPlayers(players);
  const rows = sorted.map(p=>`
    <tr>
      <td class="name-cell"><span class="dorsal">${p.dorsal}</span>${p.name}</td>
      <td>${posBadge(p.position)}</td>
      <td class="num">${p.callUpsTotal}</td>
      <td class="num">${p.matches}</td>
      <td class="num">${p.titularTotal}</td>
      <td class="num">${p.suplenteTotal}</td>
      <td class="num">${p.minutesTotal}</td>
      <td class="num">${p.minutesAvg}</td>
      <td class="num">${p.goalsTotal}</td>
      <td class="num">${p.goalsAvg}</td>
      <td class="num">${p.goalsConcededTotal!==null ? p.goalsConcededTotal+` <span style="color:var(--chalk-dim)">(${p.goalsConcededAvg}/p)</span>` : "—"}</td>
      <td class="num">${yellowCardsDisplay(p)}</td>
    </tr>
  `).join("");
  const headerCells = SORT_COLUMNS.map(col=>{
    const active = sortState.key === col.key;
    const arrow = active ? (sortState.dir === "asc" ? " ▲" : " ▼") : "";
    return `<th class="sortable${active?' active':''}" data-sort-key="${col.key}">${col.label}${arrow}</th>`;
  }).join("");
  return `<table class="players">
    <thead><tr>${headerCells}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function attachSortHandlers(container){
  container.querySelectorAll("th.sortable").forEach(th=>{
    th.onclick = () => setSort(th.dataset.sortKey);
  });
}

function renderTeamView(){
  const team = TEAMS.find(t=>t.id===selectedTeamId);
  if(!team){
    mainEl.innerHTML = `<div class="empty-state"><h2>Cargando…</h2><p>Un momento mientras se cargan los datos.</p></div>`;
    return;
  }
  mainEl.innerHTML = `
    <div class="team-header">
      ${crestHtml(team,56)}
      <div>
        <h1>${team.name}</h1>
        <div class="team-meta">${team.played} partidos jugados · Temporada 25/26</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn ${activeTab==='plantilla'?'active':''}" data-tab="plantilla">Plantilla</button>
      <button class="tab-btn ${activeTab==='equipo'?'active':''}" data-tab="equipo">Equipo</button>
    </div>

    <div id="tabContent"></div>
  `;

  mainEl.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.onclick = () => { activeTab = btn.dataset.tab; renderTeamView(); };
  });

  const content = document.getElementById("tabContent");
  if(activeTab==="plantilla"){
    content.innerHTML = `<div class="section-block">${playersTable(team.players)}</div>`;
    attachSortHandlers(content);
  } else {
    content.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card">
          <div class="label">Goles a favor (total)</div>
          <div class="value">${team.goalsForTotal}</div>
        </div>
        <div class="stat-card">
          <div class="label">Goles a favor (media/partido)</div>
          <div class="value">${team.goalsForAvg}</div>
        </div>
        <div class="stat-card">
          <div class="label">Goles en contra (total)</div>
          <div class="value">${team.goalsAgainstTotal}</div>
        </div>
        <div class="stat-card">
          <div class="label">Goles en contra (media/partido)</div>
          <div class="value">${team.goalsAgainstAvg}</div>
        </div>
      </div>
      <div class="two-col">
        <div>
          <div class="timeline-block-title">Minutos en que marca (total)</div>
          ${timelineHtml(team.gfBucketsTotal, team.gfBucketsAvg)}
        </div>
        <div>
          <div class="timeline-block-title">Minutos en que encaja (total)</div>
          ${timelineHtml(team.gaBucketsTotal, team.gaBucketsAvg, "clay")}
        </div>
      </div>
      <div class="section-block" style="margin-top:28px;">
        <div class="timeline-block-title">Goles en momentos clave</div>
        ${keyMomentsTable(team.keyMoments)}
      </div>
    `;
  }
}

function compareStatRow(label, a, b){
  return `<div class="compare-stat-row"><div class="a">${a}</div><div class="label">${label}</div><div class="c">${b}</div></div>`;
}

function renderCompareView(){
  if(!compareA || !compareB){
    mainEl.innerHTML = `
      <div class="empty-state">
        <h2>Comparar equipos</h2>
        <p>Elige dos equipos en el panel de la izquierda para ver su comparativa completa: goles en contra, reparto de goles por tramos de 15 minutos y plantillas una junto a la otra.</p>
      </div>`;
    return;
  }
  const A = TEAMS.find(t=>t.id===compareA);
  const B = TEAMS.find(t=>t.id===compareB);

  mainEl.innerHTML = `
    <div class="compare-wrap">
      <h1>Comparativa</h1>
      <div class="team-meta">${A.name} vs ${B.name}</div>

      <div class="section-block" style="margin-top:22px;">
        ${compareStatRow("Goles a favor (total)", A.goalsForTotal, B.goalsForTotal)}
        ${compareStatRow("Goles a favor (media)", A.goalsForAvg, B.goalsForAvg)}
        ${compareStatRow("Goles en contra (total)", A.goalsAgainstTotal, B.goalsAgainstTotal)}
        ${compareStatRow("Goles en contra (media)", A.goalsAgainstAvg, B.goalsAgainstAvg)}
      </div>

      <div class="two-col section-block">
        <div>
          <div class="compare-team-title">${crestHtml(A,34)}${A.name}</div>
          <div class="timeline-block-title">Encaja por tramos (total)</div>
          ${timelineHtml(A.gaBucketsTotal, A.gaBucketsAvg, "clay")}
        </div>
        <div>
          <div class="compare-team-title">${crestHtml(B,34)}${B.name}</div>
          <div class="timeline-block-title">Encaja por tramos (total)</div>
          ${timelineHtml(B.gaBucketsTotal, B.gaBucketsAvg, "clay")}
        </div>
      </div>

      <div class="compare-cols section-block">
        <div>
          <div class="compare-team-title">${crestHtml(A,34)}${A.name}</div>
          ${playersTable(A.players)}
        </div>
        <div>
          <div class="compare-team-title">${crestHtml(B,34)}${B.name}</div>
          ${playersTable(B.players)}
        </div>
      </div>
    </div>
  `;
  attachSortHandlers(mainEl);
}

function renderAll(){
  renderSidebar();
  if(mode==="team") renderTeamView();
  else renderCompareView();
}

loadRealData();
</script>
</body>
</html>
